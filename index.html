<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Express Local Push Test</title>
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <h1>Express Local Push Test</h1>
  <p>Prueba limpia de notificaciones push.</p>
  <button id="btn">Activar notificaciones</button>
  <pre id="salida"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQfbLIlHZ18BNBqKAxIRY7HHd_QcQbpxg",
      authDomain: "express-local-push-test.firebaseapp.com",
      projectId: "express-local-push-test",
      storageBucket: "express-local-push-test.firebasestorage.app",
      messagingSenderId: "895952227571",
      appId: "1:895952227571:web:53b7cbc65e2acc69993b86"
    };

    const vapidKey = "BDAeUsGr4l__q54Crj0gZpmhIrGex_Yr3bBZljhB1JB7zFvFIR-V0IzwRCZNo3OifsvRNCF0lWyuW9gY-9AK_c8";

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);
    const salida = document.getElementById("salida");

    document.getElementById("btn").addEventListener("click", async () => {
      try {
        salida.textContent = "Solicitando permiso...";

        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          salida.textContent = "Permiso denegado.";
          return;
        }

        salida.textContent = "Registrando service worker...";

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        await navigator.serviceWorker.ready;

        salida.textContent = "Generando token...";

        const token = await getToken(messaging, {
          vapidKey: vapidKey,
          serviceWorkerRegistration: registration
        });

        salida.textContent = "TOKEN DEL DISPOSITIVO:\n\n" + token;
        console.log("TOKEN DEL DISPOSITIVO:", token);
        alert("Token generado correctamente.");

      } catch (error) {
        console.error("Error al activar notificaciones:", error);
        salida.textContent = "ERROR:\n" + error.message;
      }
    });

    onMessage(messaging, (payload) => {
      const titulo = payload.notification?.title || "Express Local";
      const cuerpo = payload.notification?.body || "Nueva notificación";

      new Notification(titulo, { body: cuerpo });
      alert(titulo + "\n" + cuerpo);
    });
  </script>
</body>
</html>
